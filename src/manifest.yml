name: __MSG_extName__
version: __VERSION__
manifest_version: 3
description: __MSG_extDescription__
author: Cause & Effect Strategy
homepage_url: 'https://causeandeffectstrategy.com/'
icons:
  '16': public/images/icon16.png
  '48': public/images/icon48.png
  '128': public/images/icon128.png
default_locale: en
action:
  default_icon:
    '16': public/images/icon16b.png
    '32': public/images/icon32b.png
    '38': public/images/icon38b.png # for Android 1.5xDPI
    '48': public/images/icon48b.png # for Android 2xDPI
    '64': public/images/icon64b.png
  default_title: __MSG_extName__
  default_popup: popup/index.html
background:
  scripts: []
  service_worker: background.js
options_ui:
  page: options/index.html#settings
  open_in_tab: true
content_scripts:
  - js:
      - injected-web.js
      - injected.js
    matches:
      - <all_urls>
    run_at: document_start
    all_frames: true
permissions:
  - tabs
  - notifications
  - storage
  - unlimitedStorage
  - clipboardWrite
  - contextMenus
  - cookies
  - declarativeNetRequest
  - declarativeNetRequestFeedback
host_permissions:
  - <all_urls>
commands:
  _execute_action: {}
  toggleInjection:
    description: __MSG_toggleInjection__
  dashboard:
    description: __MSG_menuDashboard__
  settings:
    description: __MSG_labelSettings__
  newScript:
    description: __MSG_menuNewScript__
  SkipScripts:
    description: __MSG_skipScripts__
  updateScripts:
    description: __MSG_updateScriptsAll__
  updateScriptsInTab:
    description: __MSG_updateScriptsInTab__

minimum_chrome_version: '88.0'
# 88: Manifest V3 support
# 88: Dynamic content scripts registration

browser_specific_settings:
  gecko:
    id: '{3f7b1a2e-9c8d-4e55-8f24-1a2b3c4d5e6f}'
    strict_min_version: '109.0'
    update_url: 'https://smanager.causeandeffectstrategy.com/api/Injector/update?browser=firefox'