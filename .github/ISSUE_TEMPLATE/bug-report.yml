name: 🐞 Bug Report
description: For bugs that also exist in beta
title: "[BUG] "
labels: ["bug"]
body:

  - type: markdown
    attributes:
      value: |
        Please search the existing issues first as the problem may be already reported.

        Please verify the bug is not fixed in the latest beta:
        https://github.com/violentmonkey/violentmonkey/releases

  - type: textarea
    id: problem
    validations:
      required: true
    attributes:
      label: ❌ Problem Behaviour
      description: e.g. Error in devtools console

  - type: textarea
    id: expectedResult
    validations:
      required: true
    attributes:
      label: ✅ Expected Result
      description: e.g. "ok" in console or some button appears

  - type: textarea
    id: sequenceOfActions
    validations:
      required: true
    attributes:
      label: ✏️ Sequence of Actions
      description: The steps that can be taken to produce the buggy behaviour
      placeholder: |
        1. Install UserScript
        2. Open example.com
        3. Click Page

  - type: input
    id: envOS
    validations:
      required: true
    attributes:
      label: 🖥️ Operating System
      placeholder: Windows 11

  - type: input
    id: envBrowser
    validations:
      required: true
    attributes:
      label: 🌐 Browser
      description: Specify your browser and version number
      placeholder: Chrome v123

  - type: input
    id: envVMVersion
    validations:
      required: true
    attributes:
      label: 🐵 Violentmonkey Version
      placeholder: v2.5

  - type: textarea
    id: consoleMessages
    validations:
      required: false
    attributes:
      label: 📄 Console Messages
      description: This will be automatically formatted into code, so no need for backticks.
      render: shell

  - type: checkboxes
    id: userConfirmation
    attributes:
      label: Confirm New Issue
      options:
        - label: I have searched through the existing issues, verified the bug has not been fixed in the latest beta, and confirm that to the best of my knowledge this problem has not yet been reported
          required: true
